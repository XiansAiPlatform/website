name: Deploy Xians.ai on Version Tag (Using Scripts)

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps using Scripts
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'public-app/package-lock.json'

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Install Azure CLI
        uses: azure/CLI@v1
        with:
          azcliversion: latest

      - name: Install Azure Static Web Apps CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Build and Deploy using Scripts
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          cd scripts
          echo "Building application..."
          ./deploy-xians.sh build
          
          echo "Deploying application..."
          ./deploy-xians.sh deploy

      - name: Deployment Success
        run: |
          echo "🚀 Successfully deployed version ${{ steps.version.outputs.version }}"
          echo "Site URL: https://delightful-pond-07a790e03.1.azurestaticapps.net"
