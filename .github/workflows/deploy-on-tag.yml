name: Deploy Xians.ai on Version Tag

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write  # Required for creating releases
  actions: read
  checks: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'public-app/package-lock.json'

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Install dependencies
        run: |
          cd public-app
          npm ci

      - name: Build application
        run: |
          cd public-app
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/public-app'
          output_location: 'dist'
          skip_api_build: true

      - name: Deployment Success Notification
        run: |
          echo "🚀 Successfully deployed version ${{ steps.version.outputs.version }}"
          echo "Site URL: https://delightful-pond-07a790e03.1.azurestaticapps.net"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes in ${{ steps.version.outputs.version }}
            
            🚀 **Deployed to**: https://delightful-pond-07a790e03.1.azurestaticapps.net
            
            ### What's Changed
            - Automatic deployment triggered by version tag
            - Built and deployed React application
            
            ### Deployment Details
            - **Build Status**: ✅ Success
            - **Deployment Method**: Azure Static Web Apps
            - **Tag**: ${{ steps.version.outputs.version }}
            - **Commit**: ${{ github.sha }}
          draft: false
          prerelease: false
